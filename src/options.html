<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get笔记设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="settings-card">
      <header>
        <img src="../assets/icon-48.png" alt="" />
        <div>
          <span class="eyebrow">CHROME EXTENSION</span>
          <h1>Get笔记设置</h1>
        </div>
      </header>

      <p class="intro">在 Get笔记开放平台生成凭据后，将其导入或填写在这里。数据仅保存在本机 Chrome 中。</p>

      <form id="settingsForm">
        <section class="import-panel" aria-labelledby="importTitle">
          <h2 id="importTitle">一键导入凭据</h2>
          <p>
            在开放平台选择「Get笔记浏览器插件」，点击「生成Key」并一键复制。将完整内容粘贴到下方，即可自动解析。
          </p>
          <a href="https://www.biji.com/openapi?tab=clients" target="_blank" rel="noreferrer">打开应用列表</a>

          <label for="credentialsPaste">一键复制内容</label>
          <textarea
            id="credentialsPaste"
            rows="4"
            placeholder="得到大脑 API Key: Chrome&#10;API Key: gk_live_...&#10;Client ID: cli_..."
            autocomplete="off"
            spellcheck="false"
          ></textarea>
          <div class="import-actions">
            <button id="parseButton" class="secondary-button" type="button">解析并填入</button>
          </div>
        </section>

        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" placeholder="gk_live_..." autocomplete="off" spellcheck="false" required />

        <label for="clientId">Client ID</label>
        <input id="clientId" type="text" placeholder="cli_..." autocomplete="off" spellcheck="false" required />
        <p class="hint">Get笔记官方接口要求 API Key 和 Client ID 同时提供。</p>

        <p id="feedback" class="feedback" role="status" aria-live="polite" hidden></p>

        <div class="actions">
          <a href="https://www.biji.com/openapi?tab=docs" target="_blank" rel="noreferrer">查看 API 文档</a>
          <button id="saveButton" type="submit">保存设置</button>
        </div>
      </form>
    </main>

    <script type="module" src="./options.js"></script>
  </body>
</html>
