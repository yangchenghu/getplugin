<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>保存到 Get笔记</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="toolbar">
        <div class="brand">
          <img src="../assets/icon-32.png" alt="" />
          <span>Get笔记</span>
        </div>
        <button id="settingsButton" class="icon-button" type="button" aria-label="打开 API 设置" title="API 设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z" />
            <path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1A8 8 0 0 0 14.8 6l-.3-2.5h-4L10.2 6a8 8 0 0 0-1.7 1.1l-2.4-1-2 3.4 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a8 8 0 0 0 1.7 1.1l.3 2.5h4l.3-2.5a8 8 0 0 0 1.7-1.1l2.4 1 2-3.4-2-1.5a7 7 0 0 0 .1-1Z" />
          </svg>
          <span id="settingsDot" class="settings-dot" aria-hidden="true"></span>
        </button>
      </header>

      <section class="page-preview" aria-labelledby="pageTitle">
        <span id="pageHost" class="page-host">正在读取页面…</span>
        <h1 id="pageTitle">当前页面</h1>
      </section>

      <div class="field">
        <label for="knowledgeSelect">保存到</label>
        <div class="select-wrap">
          <select id="knowledgeSelect">
            <option value="">全部笔记</option>
          </select>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m8 10 4 4 4-4" />
          </svg>
        </div>
        <p>会记住上次选择的知识库</p>
      </div>

      <p id="feedback" class="feedback" role="status" aria-live="polite" hidden></p>

      <button id="saveButton" class="save-button" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 4v11M7.5 10.5 12 15l4.5-4.5M5 19h14" />
        </svg>
        <span id="saveButtonText">保存到 Get笔记</span>
      </button>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
